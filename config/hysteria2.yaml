listen: :50000
tls:
  cert: $TLS_CERT_PATH
  key: $TLS_KEY_PATH
auth:
  type: password
  password: $HYSTERIA_PASSWORD
masquerade:
  type: proxy
  proxy:
    url: https://www.bing.com
    rewriteHost: true
  listenHTTP: :80
  listenHTTPS: :443
trafficStats:
  listen: :9999
ignoreClientIP: true
